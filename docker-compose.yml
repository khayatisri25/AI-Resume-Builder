version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Persist SQLite databases, generated PDFs/DOCXs, and server logs on the host
      - ./database:/app/backend/database
      - ./generated:/app/backend/generated
      - ./logs:/app/backend/logs
    env_file:
      - .env.example # Can be replaced with active .env file on deploy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
